
name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
         python-version: "3.11"

    - uses: astral-sh/setup-uv@v5

    - run: uv sync

    - run: uv run pytest
